kind = "web"
previewPath = "/"
title = "EMDR Therapy Assistant"
version = "1.0.0"
id = "artifacts/emdr-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24825

[services.development]
run = "pnpm --filter @workspace/emdr-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emdr-app", "run", "build" ]
publicDir = "artifacts/emdr-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24825"
BASE_PATH = "/"
